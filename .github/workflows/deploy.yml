name: Deploy to CentOS

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-rich-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ARCHIVE_NAME: rich-${{ github.run_id }}-${{ github.run_attempt }}.tar.gz
      DEPLOY_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Build app on GitHub Actions
        run: |
          npm ci
          npm run build

      - name: Create deploy package (standalone)
        run: |
          rm -rf bundle
          mkdir -p bundle/.next
          cp -R .next/standalone/* bundle/
          cp -R .next/static bundle/.next/static
          if [ -d public ]; then
            cp -R public bundle/public
          fi
          tar \
            -czf "$ARCHIVE_NAME" \
            -C bundle .

      - name: Upload package to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: ${{ env.ARCHIVE_NAME }}
          target: "/tmp"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          QQ_USERNAME: ${{ secrets.QQ_USERNAME }}
          QQ_PASSWORD: ${{ secrets.QQ_PASSWORD }}
          ARCHIVE_NAME: ${{ env.ARCHIVE_NAME }}
          DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: QQ_USERNAME,QQ_PASSWORD,ARCHIVE_NAME,DEPLOY_SHA
          debug: true
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="$HOME/apps/rich"
            RELEASES_DIR="$APP_DIR/releases"
            CURRENT_LINK="$APP_DIR/current"
            NEW_RELEASE_DIR="$RELEASES_DIR/${DEPLOY_SHA}"
            ARCHIVE="/tmp/${ARCHIVE_NAME}"
            LOCK_FILE="$APP_DIR/deploy.lock"

            if [ -z "${QQ_USERNAME}" ] || [ -z "${QQ_PASSWORD}" ]; then
              echo "QQ secrets are empty. Please check QQ_USERNAME/QQ_PASSWORD."
              exit 1
            fi

            echo "[deploy] check node/pm2/nginx"
            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://rpm.nodesource.com/setup_18.x | bash -
              dnf install -y nodejs
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            if ! command -v nginx >/dev/null 2>&1; then
              dnf install -y nginx
            fi

            echo "[deploy] locate archive"
            if [ ! -f "$ARCHIVE" ]; then
              FOUND_ARCHIVE="$(find /tmp -maxdepth 4 -type f -name "${ARCHIVE_NAME}" | head -n 1 || true)"
              if [ -n "$FOUND_ARCHIVE" ]; then
                ARCHIVE="$FOUND_ARCHIVE"
              else
                echo "Archive not found: ${ARCHIVE_NAME}"
                find /tmp -maxdepth 4 -type f | head -n 50
                exit 1
              fi
            fi

            echo "[deploy] extract release"
            mkdir -p "$APP_DIR" "$RELEASES_DIR"
            exec 9>"$LOCK_FILE"
            flock -w 600 9

            rm -rf "$NEW_RELEASE_DIR"
            mkdir -p "$NEW_RELEASE_DIR"
            tar -xzf "$ARCHIVE" -C "$NEW_RELEASE_DIR"

            cd "$NEW_RELEASE_DIR"

            cat > .env.production <<ENVEOF
            NODE_ENV=production
            HOSTNAME=0.0.0.0
            PORT=3000
            SMTP_HOST=smtp.qq.com
            SMTP_PORT=465
            SMTP_SECURE=true
            SMTP_USER=${QQ_USERNAME}
            SMTP_PASS=${QQ_PASSWORD}
            MAIL_FROM=${QQ_USERNAME}
            MAIL_TO=${QQ_USERNAME}
            ENVEOF
            chmod 600 .env.production

            ln -sfn "$NEW_RELEASE_DIR" "$CURRENT_LINK"

            echo "[deploy] restart app"
            if [ ! -f "$CURRENT_LINK/server.js" ]; then
              echo "Missing server.js in release: $CURRENT_LINK"
              ls -la "$CURRENT_LINK" || true
              exit 1
            fi

            pm2 delete rich >/dev/null 2>&1 || true
            pm2 start server.js --name rich --cwd "$CURRENT_LINK" --update-env

            # Validate process is online; print logs for faster diagnosis if it crashes immediately.
            sleep 2
            PM2_PID="$(pm2 pid rich || true)"
            if [ -z "$PM2_PID" ] || [ "$PM2_PID" = "0" ]; then
              echo "pm2 app 'rich' is not running after start."
              pm2 logs rich --lines 80 --nostream || true
              exit 1
            fi

            pm2 save
            pm2 startup systemd -u root --hp /root || true

            echo "[deploy] configure nginx"
            mkdir -p /etc/nginx/certs
            if [ ! -f /etc/nginx/certs/rich.key ] || [ ! -f /etc/nginx/certs/rich.crt ]; then
              openssl req -x509 -newkey rsa:2048 -sha256 -days 3650 -nodes \
                -keyout /etc/nginx/certs/rich.key \
                -out /etc/nginx/certs/rich.crt \
                -subj "/CN=${HOSTNAME:-localhost}"
            fi

            printf '%s\n' \
              'server {' \
              '  listen 80;' \
              '  server_name _;' \
              '  return 301 https://$host$request_uri;' \
              '}' \
              '' \
              'server {' \
              '  listen 443 ssl;' \
              '  server_name _;' \
              '' \
              '  ssl_certificate /etc/nginx/certs/rich.crt;' \
              '  ssl_certificate_key /etc/nginx/certs/rich.key;' \
              '  ssl_protocols TLSv1.2 TLSv1.3;' \
              '' \
              '  location / {' \
              '    proxy_pass http://127.0.0.1:3000;' \
              '    proxy_http_version 1.1;' \
              '    proxy_set_header Host $host;' \
              '    proxy_set_header X-Real-IP $remote_addr;' \
              '    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' \
              '    proxy_set_header X-Forwarded-Proto $scheme;' \
              '    proxy_set_header Upgrade $http_upgrade;' \
              '    proxy_set_header Connection "upgrade";' \
              '  }' \
              '}' \
              > /etc/nginx/conf.d/rich.conf

            if ! nginx -t; then
              echo "nginx config test failed"
              nginx -T || true
              exit 1
            fi

            if ! systemctl enable --now nginx; then
              echo "failed to enable/start nginx"
              systemctl status nginx --no-pager -l || true
              journalctl -u nginx -n 80 --no-pager || true
              exit 1
            fi

            if ! systemctl restart nginx; then
              echo "failed to restart nginx"
              systemctl status nginx --no-pager -l || true
              journalctl -u nginx -n 80 --no-pager || true
              exit 1
            fi

            if command -v firewall-cmd >/dev/null 2>&1; then
              firewall-cmd --permanent --add-service=http || true
              firewall-cmd --permanent --add-service=https || true
              firewall-cmd --reload || true
            fi

            ls -1dt "$RELEASES_DIR"/* 2>/dev/null | tail -n +6 | xargs -r rm -rf
            rm -f "$ARCHIVE"
